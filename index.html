<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>高階 AI 踩地雷與多功能計時器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #eef2f3;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; color: #2c3e50; }
        
        .panel {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            width: 100%;
            max-width: 800px;
        }
        .section {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .section:last-child { margin-bottom: 0; }
        
        label { font-weight: bold; font-size: 14px; }
        input[type="number"] {
            width: 50px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        
        button {
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn-mode { background-color: #7f8c8d; color: white; }
        .btn-mode:hover { background-color: #95a5a6; }
        .btn-mode.active { background-color: #2c3e50; }
        
        #btn-step { background-color: #2ecc71; color: white; }
        #btn-step:hover { background-color: #27ae60; }
        #btn-loop { background-color: #3498db; color: white; }
        #btn-loop:hover { background-color: #2980b9; }
        #btn-custom { background-color: #e67e22; color: white; }
        #btn-custom:hover { background-color: #d35400; }
        
        /* 儀表板 */
        .dashboard {
            display: flex;
            justify-content: space-between;
            background: #34495e;
            color: #ecf0f1;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 18px;
            font-family: monospace;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        
        /* 棋盤外框 */
        .board-container {
            max-width: 100%;
            overflow: auto;
            padding: 5px;
            background-color: #bdc3c7;
            border-radius: 6px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        #board {
            display: grid;
            gap: 2px;
            background-color: #bdc3c7;
            user-select: none;
        }
        
        /* 棋格樣式 */
        .cell {
            width: 26px;
            height: 26px;
            background-color: #ecf0f1;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            box-shadow: inset 0 -2px 0 #bdc3c7;
        }
        .cell:hover { background-color: #dfe6e9; }
        .cell.revealed {
            background-color: #dcdde1;
            box-shadow: none;
            cursor: default;
        }
        .cell.mine { background-color: #e74c3c; color: white; }
        .cell.flagged { background-color: #f1c40f; }
        
        /* 數字顏色 */
        .n1 { color: #2980b9; }
        .n2 { color: #27ae60; }
        .n3 { color: #c0392b; }
        .n4 { color: #8e44ad; }
        .n5 { color: #d35400; }
        .n6 { color: #16a085; }
        .n7 { color: #2c3e50; }
        .n8 { color: #7f8c8d; }
    </style>
</head>
<body>

    <h1>踩地雷 AI 解密器</h1>
    
    <div class="panel">
        <div class="section">
            <label>選擇難度：</label>
            <button class="btn-mode active" onclick="changeDifficulty('easy', this)">初級 (10x10)</button>
            <button class="btn-mode" onclick="changeDifficulty('medium', this)">中級 (16x16)</button>
            <button class="btn-mode" onclick="changeDifficulty('hard', this)">高級 (30x16)</button>
        </div>
        
        <div class="section">
            <label>自訂尺寸：</label>
            寬(欄) <input type="number" id="custom-w" value="20" min="5" max="50">
            高(列) <input type="number" id="custom-h" value="15" min="5" max="50">
            地雷數 <input type="number" id="custom-m" value="40" min="1" max="500">
            <button id="btn-custom" onclick="generateCustom()">生成自訂</button>
        </div>
        
        <div class="section" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
            <label>AI 操作：</label>
            <button id="btn-step">Auto Step (走一步)</button>
            <button id="btn-loop">Auto Play (全自動)</button>
        </div>
    </div>
    
    <div class="panel" style="padding: 0; width: 100%; max-width: 800px;">
        <div class="dashboard">
            <div id="mine-count">地雷: 10</div>
            <div id="timer">時間: 0.0s</div>
        </div>
    </div>
    
    <div class="board-container">
        <div id="board"></div>
    </div>

<script>
// --- 遊戲全域變數 ---
let ROWS = 10;
let COLS = 10;
let MINES = 10;

let grid = [];
let gameOver = false;
let gameWon = false;
let isFirstClick = true;
let loopInterval = null;

// 計時器專用變數
let startTime = null;
let timerInterval = null;
let elapsedTime = 0; // 儲存毫秒數

// --- 初始化與難度切換 ---
function changeDifficulty(type, btnEl) {
    document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
    if(btnEl) btnEl.classList.add('active');
    
    if (type === 'easy') { ROWS = 10; COLS = 10; MINES = 10; }
    else if (type === 'medium') { ROWS = 16; COLS = 16; MINES = 40; }
    else if (type === 'hard') { ROWS = 16; COLS = 30; MINES = 99; }
    
    initGame();
}

function generateCustom() {
    document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
    
    const w = parseInt(document.getElementById('custom-w').value);
    const h = parseInt(document.getElementById('custom-h').value);
    const m = parseInt(document.getElementById('custom-m').value);
    
    // 防呆驗證
    if (isNaN(w) || w < 5 || w > 50) { alert("寬度請輸入 5 ~ 50 之間的數字"); return; }
    if (isNaN(h) || h < 5 || h > 50) { alert("高度請輸入 5 ~ 50 之間的數字"); return; }
    if (isNaN(m) || m < 1 || m >= w * h) { alert(`地雷數必須介於 1 ~ ${w * h - 1} 之間`); return; }
    
    COLS = w;
    ROWS = h;
    MINES = m;
    initGame();
}

function initGame() {
    // 清除所有既有的計時器與自動執行緒
    stopTimer();
    if (loopInterval) clearInterval(loopInterval);
    loopInterval = null;
    document.getElementById('btn-loop').innerText = "Auto Play (全自動)";
    
    gameOver = false;
    gameWon = false;
    isFirstClick = true;
    elapsedTime = 0;
    grid = [];
    
    document.getElementById('timer').innerText = "時間: 0.0s";
    document.getElementById('mine-count').innerText = `地雷: ${MINES}`;
    
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    // 動態設定 css grid 的行與列
    boardEl.style.gridTemplateColumns = `repeat(${COLS}, 26px)`;
    boardEl.style.gridTemplateRows = `repeat(${ROWS}, 26px)`;
    
    for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
            grid[r][c] = {
                isMine: false, count: 0, isRevealed: false, isFlagged: false, r: r, c: c
            };
            
            const cellEl = document.createElement('div');
            cellEl.classList.add('cell');
            cellEl.id = `cell-${r}-${c}`;
            
            cellEl.addEventListener('click', () => handleCellClick(r, c));
            cellEl.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                handleCellRightClick(r, c);
            });
            boardEl.appendChild(cellEl);
        }
    }
}

// --- 高精度計時器邏輯 ---
function startTimer() {
    startTime = performance.now() - elapsedTime;
    timerInterval = requestAnimationFrame(updateTimerText);
}

function stopTimer() {
    if (timerInterval) {
        cancelAnimationFrame(timerInterval);
        timerInterval = null;
    }
}

function updateTimerText() {
    if (gameOver || gameWon) return;
    elapsedTime = performance.now() - startTime;
    // 遊戲進行中：顯示 1 位小數
    document.getElementById('timer').innerText = `時間: ${(elapsedTime / 1000).toFixed(1)}s`;
    timerInterval = requestAnimationFrame(updateTimerText);
}

// --- 踩地雷核心遊玩機制 ---
function generateMines(startR, startC) {
    let minesPlaced = 0;
    while (minesPlaced < MINES) {
        let r = Math.floor(Math.random() * ROWS);
        let c = Math.floor(Math.random() * COLS);
        if (!grid[r][c].isMine && (r !== startR || c !== startC)) {
            grid[r][c].isMine = true;
            minesPlaced++;
        }
    }
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c].isMine) continue;
            let count = 0;
            getNeighbors(r, c).forEach(n => {
                if (grid[n.r][n.c].isMine) count++;
            });
            grid[r][c].count = count;
        }
    }
}

function getNeighbors(r, c) {
    let neighbors = [];
    for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            let nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                neighbors.push(grid[nr][nc]);
            }
        }
    }
    return neighbors;
}

function revealCell(r, c) {
    if (gameOver || gameWon || grid[r][c].isRevealed || grid[r][c].isFlagged) return;
    
    if (isFirstClick) {
        isFirstClick = false;
        generateMines(r, c);
        startTimer(); // 第一次點擊時啟動計時
    }
    
    grid[r][c].isRevealed = true;
    const cellEl = document.getElementById(`cell-${r}-${c}`);
    cellEl.classList.add('revealed');
    
    if (grid[r][c].isMine) {
        cellEl.classList.add('mine');
        cellEl.innerText = '💣';
        endGame(false);
        return;
    }
    
    if (grid[r][c].count > 0) {
        cellEl.innerText = grid[r][c].count;
        cellEl.classList.add(`n${grid[r][c].count}`);
    } else {
        getNeighbors(r, c).forEach(n => {
            if (!n.isRevealed) revealCell(n.r, n.c);
        });
    }
    
    checkWinCondition();
}

function flagCell(r, c) {
    if (gameOver || gameWon || grid[r][c].isRevealed) return;
    if (isFirstClick) startTimer(); // 防呆：如果第一步是插旗也開始計時
    
    grid[r][c].isFlagged = !grid[r][c].isFlagged;
    const cellEl = document.getElementById(`cell-${r}-${c}`);
    
    if (grid[r][c].isFlagged) {
        cellEl.classList.add('flagged');
        cellEl.innerText = '🚩';
    } else {
        cellEl.classList.remove('flagged');
        cellEl.innerText = '';
    }
    updateStatus();
}

function handleCellClick(r, c) { revealCell(r, c); }
function handleCellRightClick(r, c) { flagCell(r, c); }

function updateStatus() {
    let flags = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c].isFlagged) flags++;
        }
    }
    document.getElementById('mine-count').innerText = `地雷: ${MINES - flags}`;
}

function checkWinCondition() {
    let unrevealedSafeCells = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!grid[r][c].isMine && !grid[r][c].isRevealed) {
                unrevealedSafeCells++;
            }
        }
    }
    if (unrevealedSafeCells === 0) endGame(true);
}

function endGame(isWin) {
    gameOver = !isWin;
    gameWon = isWin;
    stopTimer();
    if (loopInterval) clearInterval(loopInterval);
    
    // 結算時：強行解鎖並將計時器精準定格到小數點後 3 位
    document.getElementById('timer').innerText = `定格: ${(elapsedTime / 1000).toFixed(3)}s`;
    
    if (isWin) {
        document.getElementById('mine-count').innerText = "🎉 AI 成功通關！";
    } else {
        document.getElementById('mine-count').innerText = "💥 踩雷爆掉了！";
    }
    
    // 翻開所有地雷
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c].isMine && !grid[r][c].isFlagged) {
                const cellEl = document.getElementById(`cell-${r}-${c}`);
                cellEl.classList.add('mine');
                cellEl.innerText = '💣';
            }
        }
    }
}

// ==========================================
//               核心 AI 解密器
// ==========================================
function aiPlayStep() {
    if (gameOver || gameWon) return false;
    
    // 1. 開局第一步點在正中央附近
    if (isFirstClick) {
        revealCell(Math.floor(ROWS/2), Math.floor(COLS/2));
        return true;
    }
    
    let safeMoves = [];
    let mineMoves = [];
    
    // 2. 進行基礎邏輯掃描
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            let cell = grid[r][c];
            if (!cell.isRevealed || cell.count === 0) continue;
            
            let neighbors = getNeighbors(r, c);
            let hiddenNeighbors = [];
            let flagCount = 0;
            
            neighbors.forEach(n => {
                if (!n.isRevealed && !n.isFlagged) hiddenNeighbors.push(n);
                if (n.isFlagged) flagCount++;
            });
            
            if (hiddenNeighbors.length === 0) continue;
            
            // 邏輯一：周圍隱藏格 + 已插旗格 === 提示數字 -> 全是雷
            if (hiddenNeighbors.length + flagCount === cell.count) {
                hiddenNeighbors.forEach(n => {
                    if (!mineMoves.some(m => m.r === n.r && m.c === n.c)) mineMoves.push(n);
                });
            }
            
            // 邏輯二：已插旗格 === 提示數字 -> 其餘隱藏格皆安全
            if (flagCount === cell.count) {
                hiddenNeighbors.forEach(n => {
                    if (!safeMoves.some(m => m.r === n.r && m.c === n.c)) safeMoves.push(n);
                });
            }
        }
    }
    
    if (safeMoves.length > 0) { revealCell(safeMoves[0].r, safeMoves[0].c); return true; }
    if (mineMoves.length > 0) { flagCell(mineMoves[0].r, mineMoves[0].c); return true; }
    
    // 3. 邏輯卡死時，進行風險機率盲猜
    return guessBestMove();
}

function guessBestMove() {
    let bestCell = null;
    let minProbability = 1.1;
    
    let cellProbabilities = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
    let cellCounts = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            let cell = grid[r][c];
            if (!cell.isRevealed || cell.count === 0) continue;
            
            let neighbors = getNeighbors(r, c);
            let hidden = neighbors.filter(n => !n.isRevealed && !n.isFlagged);
            let flags = neighbors.filter(n => n.isFlagged).length;
            
            if (hidden.length > 0) {
                let prob = (cell.count - flags) / hidden.length;
                hidden.forEach(n => {
                    cellProbabilities[n.r][n.c] += prob;
                    cellCounts[n.r][n.c]++;
                });
            }
        }
    }
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!grid[r][c].isRevealed && !grid[r][c].isFlagged) {
                let p = 0.18; // 預設盲猜邊際機率值
                if (cellCounts[r][c] > 0) {
                    p = cellProbabilities[r][c] / cellCounts[r][c];
                }
                if (p < minProbability) {
                    minProbability = p;
                    bestCell = grid[r][c];
                }
            }
        }
    }
    
    if (bestCell) { revealCell(bestCell.r, bestCell.c); return true; }
    return false;
}

// --- 事件處理與綁定 ---
document.getElementById('btn-step').addEventListener('click', () => { aiPlayStep(); });

document.getElementById('btn-loop').addEventListener('click', () => {
    const btn = document.getElementById('btn-loop');
    if (loopInterval) {
        clearInterval(loopInterval);
        loopInterval = null;
        btn.innerText = "Auto Play (全自動)";
    } else {
        btn.innerText = "Pause (暫停)";
        loopInterval = setInterval(() => {
            let moved = aiPlayStep();
            if (!moved || gameOver || gameWon) {
                clearInterval(loopInterval);
                loopInterval = null;
                btn.innerText = "Auto Play (全自動)";
            }
        }, 100); // 高速執行：每步 100 毫秒
    }
});

// 開局初始化
initGame();
</script>

</body>
</html>
