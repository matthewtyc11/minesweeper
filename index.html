<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業級 AI 踩地雷與 3BV 數據分析器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #eef2f3;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; color: #2c3e50; }
        
        .panel {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            width: 100%;
            max-width: 800px;
        }
        .section {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 10px;
        }
        .section:last-child { margin-bottom: 0; }
        
        label { font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        input[type="number"] {
            width: 50px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        input[type="range"] { cursor: pointer; }
        
        button {
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn-mode { background-color: #7f8c8d; color: white; }
        .btn-mode:hover { background-color: #95a5a6; }
        .btn-mode.active { background-color: #2c3e50; }
        
        #btn-step { background-color: #2ecc71; color: white; }
        #btn-step:hover { background-color: #27ae60; }
        #btn-loop { background-color: #3498db; color: white; }
        #btn-loop:hover { background-color: #2980b9; }
        #btn-custom { background-color: #e67e22; color: white; }
        #btn-custom:hover { background-color: #d35400; }
        
        /* 儀表板 */
        .dashboard {
            display: flex;
            justify-content: space-between;
            background: #34495e;
            color: #ecf0f1;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 18px;
            font-family: monospace;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* 統計數據結果面板 */
        #stats-panel {
            display: none;
            background: #27ae60;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 15px;
            width: 100%;
            max-width: 770px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #stats-panel.loss { background: #c0392b; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-top: 5px;
        }
        .stat-item { background: rgba(0,0,0,0.15); padding: 8px; border-radius: 4px; text-align: center; }
        
        /* 棋盤外框 */
        .board-container {
            max-width: 100%;
            overflow: auto;
            padding: 5px;
            background-color: #bdc3c7;
            border-radius: 6px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        #board {
            display: grid;
            gap: 2px;
            background-color: #bdc3c7;
            user-select: none;
        }
        
        /* 棋格樣式 */
        .cell {
            width: 26px;
            height: 26px;
            background-color: #ecf0f1;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            box-shadow: inset 0 -2px 0 #bdc3c7;
        }
        .cell:hover { background-color: #dfe6e9; }
        .cell.revealed {
            background-color: #dcdde1;
            box-shadow: none;
            cursor: default;
        }
        .cell.mine { background-color: #e74c3c; color: white; }
        .cell.flagged { background-color: #f1c40f; }
        
        /* 數字顏色 */
        .n1 { color: #2980b9; }
        .n2 { color: #27ae60; }
        .n3 { color: #c0392b; }
        .n4 { color: #8e44ad; }
        .n5 { color: #d35400; }
        .n6 { color: #16a085; }
        .n7 { color: #2c3e50; }
        .n8 { color: #7f8c8d; }
    </style>
</head>
<body>

    <h1>專業級 AI 踩地雷與數據分析</h1>
    
    <div class="panel">
        <div class="section">
            <label>選擇難度：</label>
            <button class="btn-mode active" onclick="changeDifficulty('easy', this)">初級 (10x10)</button>
            <button class="btn-mode" onclick="changeDifficulty('medium', this)">中級 (16x16)</button>
            <button class="btn-mode" onclick="changeDifficulty('hard', this)">高級 (30x16)</button>
        </div>
        
        <div class="section">
            <label>自訂尺寸：</label>
            寬 <input type="number" id="custom-w" value="20" min="5" max="50">
            高 <input type="number" id="custom-h" value="15" min="5" max="50">
            雷數 <input type="number" id="custom-m" value="40" min="1" max="500">
            <button id="btn-custom" onclick="generateCustom()">生成自訂</button>
        </div>
        
        <div class="section" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
            <label>AI 操作：</label>
            <button id="btn-step">Auto Step (走一步)</button>
            <button id="btn-loop">Auto Play (全自動)</button>
            
            <label style="margin-left:15px;">
                AI 速度：
                <input type="range" id="speed-slider" min="1" max="101" value="50" style="width: 150px;">
                <span id="speed-text">中速 (200ms)</span>
            </label>
        </div>
    </div>
    
    <div id="stats-panel">
        <b id="stats-title">遊戲結束統計資訊：</b>
        <div class="stats-grid">
            <div class="stat-item">3BV<br><span id="stat-3bv">-</span></div>
            <div class="stat-item">3BV/s<br><span id="stat-3bvs">-</span></div>
            <div class="stat-item">精準時間<br><span id="stat-time">-</span></div>
            <div class="stat-item">左鍵點擊<br><span id="stat-lclick">-</span></div>
            <div class="stat-item">右鍵插旗<br><span id="stat-rclick">-</span></div>
            <div class="stat-item">AI 盲猜次數<br><span id="stat-guess">-</span></div>
        </div>
    </div>
    
    <div class="panel" style="padding: 0; width: 100%; max-width: 800px;">
        <div class="dashboard">
            <div id="mine-count">地雷: 10</div>
            <div id="timer">時間: 0.0s</div>
        </div>
    </div>
    
    <div class="board-container">
        <div id="board"></div>
    </div>

<script>
// --- 遊戲全域變數 ---
let ROWS = 10;
let COLS = 10;
let MINES = 10;

let grid = [];
let gameOver = false;
let gameWon = false;
let isFirstClick = true;
let loopTimeout = null; // 改用 Timeout 方便動態調整間隔時間

// 計時器專用
let startTime = null;
let timerInterval = null;
let elapsedTime = 0;

// 進階統計數據變數
let countLeftClicks = 0;
let countRightClicks = 0;
let countGuesses = 0;
let calculated3BV = 0;

// --- 初始化與難度切換 ---
function changeDifficulty(type, btnEl) {
    document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
    if(btnEl) btnEl.classList.add('active');
    if (type === 'easy') { ROWS = 10; COLS = 10; MINES = 10; }
    else if (type === 'medium') { ROWS = 16; COLS = 16; MINES = 40; }
    else if (type === 'hard') { ROWS = 16; COLS = 30; MINES = 99; }
    initGame();
}

function generateCustom() {
    document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
    const w = parseInt(document.getElementById('custom-w').value);
    const h = parseInt(document.getElementById('custom-h').value);
    const m = parseInt(document.getElementById('custom-m').value);
    
    if (isNaN(w) || w < 5 || w > 50 || isNaN(h) || h < 5 || h > 50) { alert("寬高請輸入 5 ~ 50 之間"); return; }
    if (isNaN(m) || m < 1 || m >= w * h) { alert(`地雷數必須介於 1 ~ ${w * h - 1}`); return; }
    
    COLS = w; ROWS = h; MINES = m;
    initGame();
}

function initGame() {
    stopTimer();
    if (loopTimeout) clearTimeout(loopTimeout);
    loopTimeout = null;
    document.getElementById('btn-loop').innerText = "Auto Play (全自動)";
    document.getElementById('stats-panel').style.display = 'none';
    
    gameOver = false; gameWon = false; isFirstClick = true; elapsedTime = 0;
    countLeftClicks = 0; countRightClicks = 0; countGuesses = 0; calculated3BV = 0;
    grid = [];
    
    document.getElementById('timer').innerText = "時間: 0.0s";
    document.getElementById('mine-count').innerText = `地雷: ${MINES}`;
    
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    boardEl.style.gridTemplateColumns = `repeat(${COLS}, 26px)`;
    boardEl.style.gridTemplateRows = `repeat(${ROWS}, 26px)`;
    
    for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
            grid[r][c] = { isMine: false, count: 0, isRevealed: false, isFlagged: false, r: r, c: c };
            const cellEl = document.createElement('div');
            cellEl.classList.add('cell');
            cellEl.id = `cell-${r}-${c}`;
            
            cellEl.addEventListener('click', () => { if(!gameOver && !gameWon) { countLeftClicks++; revealCell(r, c); } });
            cellEl.addEventListener('contextmenu', (e) => { 
                e.preventDefault(); 
                if(!gameOver && !gameWon) { countRightClicks++; flagCell(r, c); } 
            });
            boardEl.appendChild(cellEl);
        }
    }
}

// --- 計時器邏輯 ---
function startTimer() {
    startTime = performance.now() - elapsedTime;
    timerInterval = requestAnimationFrame(updateTimerText);
}
function stopTimer() {
    if (timerInterval) { cancelAnimationFrame(timerInterval); timerInterval = null; }
}
function updateTimerText() {
    if (gameOver || gameWon) return;
    elapsedTime = performance.now() - startTime;
    document.getElementById('timer').innerText = `時間: ${(elapsedTime / 1000).toFixed(1)}s`;
    timerInterval = requestAnimationFrame(updateTimerText);
}

// --- 埋雷與 3BV 計算學演算法 ---
function generateMines(startR, startC) {
    let minesPlaced = 0;
    while (minesPlaced < MINES) {
        let r = Math.floor(Math.random() * ROWS);
        let c = Math.floor(Math.random() * COLS);
        if (!grid[r][c].isMine && (r !== startR || c !== startC)) {
            grid[r][c].isMine = true;
            minesPlaced++;
        }
    }
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c].isMine) continue;
            let count = 0;
            getNeighbors(r, c).forEach(n => { if (grid[n.r][n.c].isMine) count++; });
            grid[r][c].count = count;
        }
    }
    // 地雷生成完畢，立刻計算本局的 3BV 基準值
    calculateBoard3BV();
}

function getNeighbors(r, c) {
    let neighbors = [];
    for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            let nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) neighbors.push(grid[nr][nc]);
        }
    }
    return neighbors;
}

// 實作經典的 3BV 計算演算法
function calculateBoard3BV() {
    // 複製一份盤面狀態用於模擬走位
    let visited = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
    calculated3BV = 0;

    // 第一階段：計算所有「空白大空地（0提示格）」的連鎖群組數
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!grid[r][c].isMine && grid[r][c].count === 0 && !visited[r][c]) {
                calculated3BV++;
                // 執行 BFS 標記整個空白區域及其邊緣數字格
                let queue = [{r: r, c: c}];
                visited[r][c] = true;
                while(queue.length > 0) {
                    let curr = queue.shift();
                    getNeighbors(curr.r, curr.c).forEach(n => {
                        if (!grid[n.r][n.c].isMine && !visited[n.r][n.c]) {
                            visited[n.r][n.c] = true;
                            if (grid[n.r][n.c].count === 0) queue.push({r: n.r, c: n.c});
                        }
                    });
                }
            }
        }
    }
    // 第二階段：加上所有「未被空白格連鎖揭曉」的獨立數字格
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!grid[r][c].isMine && grid[r][c].count > 0 && !visited[r][c]) {
                calculated3BV++;
            }
        }
    }
}

// --- 核心遊玩機制 ---
function revealCell(r, c) {
    if (gameOver || gameWon || grid[r][c].isRevealed || grid[r][c].isFlagged) return;
    
    if (isFirstClick) {
        isFirstClick = false;
        generateMines(r, c);
        startTimer();
    }
    
    grid[r][c].isRevealed = true;
    const cellEl = document.getElementById(`cell-${r}-${c}`);
    cellEl.classList.add('revealed');
    
    if (grid[r][c].isMine) {
        cellEl.classList.add('mine');
        cellEl.innerText = '💣';
        endGame(false);
        return;
    }
    
    if (grid[r][c].count > 0) {
        cellEl.innerText = grid[r][c].count;
        cellEl.classList.add(`n${grid[r][c].count}`);
    } else {
        getNeighbors(r, c).forEach(n => { if (!n.isRevealed) revealCell(n.r, n.c); });
    }
    checkWinCondition();
}

function flagCell(r, c) {
    if (gameOver || gameWon || grid[r][c].isRevealed) return;
    if (isFirstClick) startTimer();
    
    grid[r][c].isFlagged = !grid[r][c].isFlagged;
    const cellEl = document.getElementById(`cell-${r}-${c}`);
    cellEl.innerText = grid[r][c].isFlagged ? '🚩' : '';
    cellEl.classList.toggle('flagged', grid[r][c].isFlagged);
    updateStatus();
}

function updateStatus() {
    let flags = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) { if (grid[r][c].isFlagged) flags++; }
    }
    document.getElementById('mine-count').innerText = `地雷: ${MINES - flags}`;
}

function checkWinCondition() {
    let unrevealedSafe = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!grid[r][c].isMine && !grid[r][c].isRevealed) unrevealedSafe++;
        }
    }
    if (unrevealedSafe === 0) endGame(true);
}

function endGame(isWin) {
    gameOver = !isWin; gameWon = isWin;
    stopTimer();
    if (loopTimeout) clearTimeout(loopTimeout);
    
    const finalTimeSec = elapsedTime / 1000;
    document.getElementById('timer').innerText = `定格: ${finalTimeSec.toFixed(3)}s`;
    
    // 計算並呈現進階 3BV/s 統計數據面板
    const bvs = finalTimeSec > 0 ? (calculated3BV / finalTimeSec).toFixed(2) : 0;
    document.getElementById('stat-3bv').innerText = calculated3BV;
    document.getElementById('stat-3bvs').innerText = `${bvs} /s`;
    document.getElementById('stat-time').innerText = `${finalTimeSec.toFixed(3)}s`;
    document.getElementById('stat-lclick').innerText = countLeftClicks;
    document.getElementById('stat-rclick').innerText = countRightClicks;
    document.getElementById('stat-guess').innerText = countGuesses;
    
    const sPanel = document.getElementById('stats-panel');
    if(isWin) {
        sPanel.className = ""; document.getElementById('stats-title').innerText = "🎉 勝利！AI 完美通關。數據報表：";
        document.getElementById('mine-count').innerText = "🎉 AI 成功通關！";
    } else {
        sPanel.className = "loss"; document.getElementById('stats-title').innerText = "💥 失敗！AI 踩雷陣亡。數據報表：";
        document.getElementById('mine-count').innerText = "💥 踩雷爆掉了！";
    }
    sPanel.style.display = 'block';
    
    // 攤開所有地雷
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c].isMine && !grid[r][c].isFlagged) {
                const cellEl = document.getElementById(`cell-${r}-${c}`);
                cellEl.classList.add('mine'); cellEl.innerText = '💣';
            }
        }
    }
}

// ==========================================
//               核心 AI 解密器
// ==========================================
function aiPlayStep() {
    if (gameOver || gameWon) return false;
    
    if (isFirstClick) {
        countLeftClicks++;
        revealCell(Math.floor(ROWS/2), Math.floor(COLS/2));
        return true;
    }
    
    let safeMoves = []; let mineMoves = [];
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            let cell = grid[r][c];
            if (!cell.isRevealed || cell.count === 0) continue;
            
            let neighbors = getNeighbors(r, c);
            let hiddenNeighbors = []; let flagCount = 0;
            
            neighbors.forEach(n => {
                if (!n.isRevealed && !n.isFlagged) hiddenNeighbors.push(n);
                if (n.isFlagged) flagCount++;
            });
            if (hiddenNeighbors.length === 0) continue;
            
            if (hiddenNeighbors.length + flagCount === cell.count) {
                hiddenNeighbors.forEach(n => { if (!mineMoves.some(m => m.r === n.r && m.c === n.c)) mineMoves.push(n); });
            }
            if (flagCount === cell.count) {
                hiddenNeighbors.forEach(n => { if (!safeMoves.some(m => m.r === n.r && m.c === n.c)) safeMoves.push(n); });
            }
        }
    }
    
    if (safeMoves.length > 0) { countLeftClicks++; revealCell(safeMoves[0].r, safeMoves[0].c); return true; }
    if (mineMoves.length > 0) { countRightClicks++; flagCell(mineMoves[0].r, mineMoves[0].c); return true; }
    
    // 沒有邏輯步，發動隨機盲猜，計數器 +1
    countGuesses++;
    return guessBestMove();
}

function guessBestMove() {
    let bestCell = null; let minProbability = 1.1;
    let cellProbabilities = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
    let cellCounts = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            let cell = grid[r][c];
            if (!cell.isRevealed || cell.count === 0) continue;
            
            let neighbors = getNeighbors(r, c);
            let hidden = neighbors.filter(n => !n.isRevealed && !n.isFlagged);
            let flags = neighbors.filter(n => n.isFlagged).length;
            
            if (hidden.length > 0) {
                let prob = (cell.count - flags) / hidden.length;
                hidden.forEach(n => { cellProbabilities[n.r][n.c] += prob; cellCounts[n.r][n.c]++; });
            }
        }
    }
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!grid[r][c].isRevealed && !grid[r][c].isFlagged) {
                let p = 0.18;
                if (cellCounts[r][c] > 0) p = cellProbabilities[r][c] / cellCounts[r][c];
                if (p < minProbability) { minProbability = p; bestCell = grid[r][c]; }
            }
        }
    }
    
    if (bestCell) { countLeftClicks++; revealCell(bestCell.r, bestCell.c); return true; }
    return false;
}

// --- 速度控制與動態循環處理 ---
const speedSlider = document.getElementById('speed-slider');
const speedText = document.getElementById('speed-text');

function getDelayFromSlider(val) {
    // 刻度 101 定義為「無延遲極速狂飆」
    if (val > 100) return 0;
    // 換算延遲：滑桿越往右，毫秒數越小（速度越快）
    return Math.floor(2000 / val);
}

speedSlider.addEventListener('input', () => {
    const val = parseInt(speedSlider.value);
    if (val > 100) {
        speedText.innerText = "極速狂飆 (無延遲)";
    } else {
        speedText.innerText = `${(val / 10).toFixed(1)}x (${getDelayFromSlider(val)}ms)`;
    }
});

// 使用 Timeout 遞迴模擬循環，能即時偵測拉桿速度的改變
function autoPlayLoop() {
    let moved = aiPlayStep();
    if (!moved || gameOver || gameWon) {
        loopTimeout = null;
        document.getElementById('btn-loop').innerText = "Auto Play (全自動)";
        return;
    }
    
    const delay = getDelayFromSlider(parseInt(speedSlider.value));
    if (delay === 0) {
        // 如果拉到最右邊(無延遲)，用一個緊密的小迴圈快速解完
        let keepGoing = true;
        while(keepGoing && !gameOver && !gameWon) {
            keepGoing = aiPlayStep();
        }
        loopTimeout = null;
        document.getElementById('btn-loop').innerText = "Auto Play (全自動)";
    } else {
        loopTimeout = setTimeout(autoPlayLoop, delay);
    }
}

// --- 事件處理與點擊綁定 ---
document.getElementById('btn-step').addEventListener('click', () => { aiPlayStep(); });

document.getElementById('btn-loop').addEventListener('click', () => {
    const btn = document.getElementById('btn-loop');
    if (loopTimeout) {
        clearTimeout(loopTimeout);
        loopTimeout = null;
        btn.innerText = "Auto Play (全自動)";
    } else {
        btn.innerText = "Pause (暫停)";
        autoPlayLoop();
    }
});

document.getElementById('btn-reset').addEventListener('click', initGame);

// 開局
initGame();
</script>

</body>
</html>
