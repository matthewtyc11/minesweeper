<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業級 AI 踩地雷 (Pro Solver) 與精準數據</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background-color: #2c3e50; color: #ecf0f1; margin: 0; padding: 20px;
        }
        h1 { margin-bottom: 5px; color: #ecf0f1; text-shadow: 1px 1px 2px black; }
        
        .panel {
            background: #34495e; padding: 15px 25px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 15px;
            width: 100%; max-width: 800px;
        }
        .section {
            display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 10px;
        }
        .section:last-child { margin-bottom: 0; }
        
        label { font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        input[type="number"] {
            width: 50px; padding: 5px; border: none; border-radius: 4px;
            text-align: center; background: #ecf0f1; color: #2c3e50; font-weight: bold;
        }
        input[type="range"] { cursor: pointer; }
        
        button {
            padding: 8px 14px; font-size: 14px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 4px; transition: transform 0.1s, filter 0.2s;
        }
        button:active { transform: scale(0.95); }
        button:hover { filter: brightness(1.2); }
        
        .btn-mode { background-color: #7f8c8d; color: white; }
        .btn-mode.active { background-color: #f39c12; color: #2c3e50; box-shadow: 0 0 5px #f39c12; }
        
        #btn-step { background-color: #2ecc71; color: white; }
        #btn-loop { background-color: #3498db; color: white; }
        #btn-custom { background-color: #e67e22; color: white; }
        
        .dashboard {
            display: flex; justify-content: space-between; background: #1a252f;
            color: #2ecc71; padding: 10px 20px; border-radius: 6px;
            font-size: 20px; font-family: monospace; font-weight: bold;
            margin-bottom: 15px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); border: 1px solid #000;
        }

        #stats-panel {
            display: none; background: #27ae60; color: white; padding: 15px;
            border-radius: 6px; margin-bottom: 15px; font-family: monospace; font-size: 15px;
            width: 100%; max-width: 770px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 2px solid #fff;
        }
        #stats-panel.loss { background: #c0392b; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px; margin-top: 10px;
        }
        .stat-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: bold; margin-top: 5px; color: #f1c40f; }
        
        .board-container {
            max-width: 100%; overflow: auto; padding: 8px; background-color: #95a5a6;
            border-radius: 6px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 3px solid #7f8c8d;
        }
        #board { display: grid; gap: 2px; background-color: #7f8c8d; user-select: none; }
        
        .cell {
            width: 26px; height: 26px; background-color: #ecf0f1; border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 15px; cursor: pointer;
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2), inset 2px 2px 0px rgba(255,255,255,0.8);
        }
        .cell:hover { background-color: #bdc3c7; }
        .cell.revealed {
            background-color: #bdc3c7; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.1); cursor: default;
        }
        .cell.mine { background-color: #e74c3c; color: white; box-shadow: none; }
        .cell.flagged { background-color: #f1c40f; box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2); }
        
        .n1 { color: #2980b9; } .n2 { color: #27ae60; } .n3 { color: #c0392b; }
        .n4 { color: #8e44ad; } .n5 { color: #d35400; } .n6 { color: #16a085; }
        .n7 { color: #2c3e50; } .n8 { color: #000000; }
    </style>
</head>
<body>

    <h1>Minesweeper Pro AI</h1>
    
    <div class="panel">
        <div class="section">
            <label>選擇難度：</label>
            <button class="btn-mode active" onclick="changeDifficulty('easy', this)">初級</button>
            <button class="btn-mode" onclick="changeDifficulty('medium', this)">中級</button>
            <button class="btn-mode" onclick="changeDifficulty('hard', this)">高級</button>
        </div>
        <div class="section">
            <label>自訂尺寸：</label>
            寬 <input type="number" id="custom-w" value="30" min="5" max="50">
            高 <input type="number" id="custom-h" value="16" min="5" max="50">
            雷 <input type="number" id="custom-m" value="99" min="1" max="500">
            <button id="btn-custom" onclick="generateCustom()">生成</button>
        </div>
        <div class="section" style="margin-top: 10px; border-top: 1px solid #7f8c8d; padding-top: 15px;">
            <label>AI 控制中心：</label>
            <button id="btn-step">推導一步 (Step)</button>
            <button id="btn-loop">自動解題 (Auto)</button>
            <label style="margin-left:15px; color:#f1c40f;">
                神經反應速度：
                <input type="range" id="speed-slider" min="1" max="101" value="80" style="width: 150px;">
                <span id="speed-text">40ms</span>
            </label>
        </div>
    </div>
    
    <div id="stats-panel">
        <b id="stats-title">遊戲結算報告：</b>
        <div class="stats-grid">
            <div class="stat-item">Done 3BV / 總 3BV<span class="stat-val" id="stat-3bv">-</span></div>
            <div class="stat-item">有效 3BV/s<span class="stat-val" id="stat-3bvs">-</span></div>
            <div class="stat-item">存活時間<span class="stat-val" id="stat-time">-</span></div>
            <div class="stat-item">左鍵點擊<span class="stat-val" id="stat-lclick">-</span></div>
            <div class="stat-item">右鍵插旗<span class="stat-val" id="stat-rclick">-</span></div>
            <div class="stat-item">絕望盲猜<span class="stat-val" id="stat-guess">-</span></div>
        </div>
    </div>
    
    <div class="panel" style="padding: 0; width: 100%; max-width: 800px; border:none; background:transparent; box-shadow:none;">
        <div class="dashboard">
            <div id="mine-count">剩餘地雷: 10</div>
            <div id="timer">0.0s</div>
        </div>
    </div>
    
    <div class="board-container">
        <div id="board"></div>
    </div>

<script>
let ROWS = 10; let COLS = 10; let MINES = 10;
let grid = []; let gameOver = false; let gameWon = false; let isFirstClick = true;
let loopTimeout = null;
let startTime = null; let timerInterval = null; let elapsedTime = 0;

// 進階統計
let countLeftClicks = 0; let countRightClicks = 0; let countGuesses = 0;
let calculated3BV = 0;
let revealed3BVGroups = new Set(); // 記錄已經解開的 3BV 群組 ID

function changeDifficulty(type, btnEl) {
    document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
    if(btnEl) btnEl.classList.add('active');
    if (type === 'easy') { ROWS = 10; COLS = 10; MINES = 10; }
    else if (type === 'medium') { ROWS = 16; COLS = 16; MINES = 40; }
    else if (type === 'hard') { ROWS = 16; COLS = 30; MINES = 99; }
    initGame();
}

function generateCustom() {
    document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
    const w = parseInt(document.getElementById('custom-w').value);
    const h = parseInt(document.getElementById('custom-h').value);
    const m = parseInt(document.getElementById('custom-m').value);
    if (isNaN(w) || w < 5 || w > 50 || isNaN(h) || h < 5 || h > 50) return alert("寬高請輸入 5 ~ 50 之間");
    if (isNaN(m) || m < 1 || m >= w * h) return alert(`地雷數必須介於 1 ~ ${w * h - 1}`);
    COLS = w; ROWS = h; MINES = m; initGame();
}

function initGame() {
    stopTimer(); if (loopTimeout) clearTimeout(loopTimeout); loopTimeout = null;
    document.getElementById('btn-loop').innerText = "自動解題 (Auto)";
    document.getElementById('stats-panel').style.display = 'none';
    
    gameOver = false; gameWon = false; isFirstClick = true; elapsedTime = 0;
    countLeftClicks = 0; countRightClicks = 0; countGuesses = 0; calculated3BV = 0;
    revealed3BVGroups.clear(); grid = [];
    
    document.getElementById('timer').innerText = "0.0s";
    document.getElementById('mine-count').innerText = `剩餘地雷: ${MINES}`;
    
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    boardEl.style.gridTemplateColumns = `repeat(${COLS}, 26px)`;
    boardEl.style.gridTemplateRows = `repeat(${ROWS}, 26px)`;
    
    for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
            // bvGroup 用來綁定此格子屬於哪一個 3BV
            grid[r][c] = { isMine: false, count: 0, isRevealed: false, isFlagged: false, r: r, c: c, bvGroup: null };
            const cellEl = document.createElement('div');
            cellEl.classList.add('cell'); cellEl.id = `cell-${r}-${c}`;
            
            cellEl.addEventListener('click', () => { if(!gameOver && !gameWon) { countLeftClicks++; revealCell(r, c); } });
            cellEl.addEventListener('contextmenu', (e) => { e.preventDefault(); if(!gameOver && !gameWon) { countRightClicks++; flagCell(r, c); } });
            boardEl.appendChild(cellEl);
        }
    }
}

function startTimer() { startTime = performance.now() - elapsedTime; timerInterval = requestAnimationFrame(updateTimerText); }
function stopTimer() { if (timerInterval) { cancelAnimationFrame(timerInterval); timerInterval = null; } }
function updateTimerText() {
    if (gameOver || gameWon) return;
    elapsedTime = performance.now() - startTime;
    document.getElementById('timer').innerText = `${(elapsedTime / 1000).toFixed(1)}s`;
    timerInterval = requestAnimationFrame(updateTimerText);
}

function generateMines(startR, startC) {
    let minesPlaced = 0;
    while (minesPlaced < MINES) {
        let r = Math.floor(Math.random() * ROWS); let c = Math.floor(Math.random() * COLS);
        if (!grid[r][c].isMine && (Math.abs(r - startR) > 1 || Math.abs(c - startC) > 1)) {
            // 讓起手點周圍九宮格絕對安全 (防暴斃機制)
            grid[r][c].isMine = true; minesPlaced++;
        }
    }
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c].isMine) continue;
            grid[r][c].count = getNeighbors(r, c).filter(n => grid[n.r][n.c].isMine).length;
        }
    }
    calculateBoard3BV();
}

function getNeighbors(r, c) {
    let neighbors = [];
    for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            let nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) neighbors.push(grid[nr][nc]);
        }
    }
    return neighbors;
}

// === 真實 3BV 與 Done 3BV 計算引擎 ===
function calculateBoard3BV() {
    let visited = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
    calculated3BV = 0;
    
    // 找出所有空地連鎖區
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!grid[r][c].isMine && grid[r][c].count === 0 && !visited[r][c]) {
                calculated3BV++;
                let queue = [{r: r, c: c}]; visited[r][c] = true; grid[r][c].bvGroup = calculated3BV;
                while(queue.length > 0) {
                    let curr = queue.shift();
                    getNeighbors(curr.r, curr.c).forEach(n => {
                        if (!grid[n.r][n.c].isMine && !visited[n.r][n.c]) {
                            visited[n.r][n.c] = true; grid[n.r][n.c].bvGroup = calculated3BV;
                            if (grid[n.r][n.c].count === 0) queue.push({r: n.r, c: n.c});
                        }
                    });
                }
            }
        }
    }
    // 找出剩下的獨立數字
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!grid[r][c].isMine && grid[r][c].count > 0 && !visited[r][c]) {
                calculated3BV++; grid[r][c].bvGroup = calculated3BV;
            }
        }
    }
}

function revealCell(r, c) {
    if (gameOver || gameWon || grid[r][c].isRevealed || grid[r][c].isFlagged) return;
    
    if (isFirstClick) { isFirstClick = false; generateMines(r, c); startTimer(); }
    
    grid[r][c].isRevealed = true;
    if (grid[r][c].bvGroup !== null) revealed3BVGroups.add(grid[r][c].bvGroup); // 動態記錄 3BV 進度
    
    const cellEl = document.getElementById(`cell-${r}-${c}`);
    cellEl.classList.add('revealed');
    
    if (grid[r][c].isMine) {
        cellEl.classList.add('mine'); cellEl.innerText = '💣';
        endGame(false); return;
    }
    
    if (grid[r][c].count > 0) {
        cellEl.innerText = grid[r][c].count; cellEl.classList.add(`n${grid[r][c].count}`);
    } else {
        getNeighbors(r, c).forEach(n => { if (!n.isRevealed) revealCell(n.r, n.c); });
    }
    checkWinCondition();
}

function flagCell(r, c) {
    if (gameOver || gameWon || grid[r][c].isRevealed) return;
    if (isFirstClick) startTimer();
    grid[r][c].isFlagged = !grid[r][c].isFlagged;
    const cellEl = document.getElementById(`cell-${r}-${c}`);
    cellEl.innerText = grid[r][c].isFlagged ? '🚩' : '';
    cellEl.classList.toggle('flagged', grid[r][c].isFlagged);
    updateStatus();
}

function updateStatus() {
    let flags = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) { if (grid[r][c].isFlagged) flags++; }
    }
    document.getElementById('mine-count').innerText = `剩餘地雷: ${MINES - flags}`;
}

function checkWinCondition() {
    let unrevealedSafe = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) { if (!grid[r][c].isMine && !grid[r][c].isRevealed) unrevealedSafe++; }
    }
    if (unrevealedSafe === 0) endGame(true);
}

function endGame(isWin) {
    gameOver = !isWin; gameWon = isWin; stopTimer();
    if (loopTimeout) clearTimeout(loopTimeout);
    
    const finalTimeSec = elapsedTime / 1000;
    document.getElementById('timer').innerText = `${finalTimeSec.toFixed(3)}s`;
    
    // === 真實 Done 3BV/s 結算 ===
    const done3BV = revealed3BVGroups.size;
    const bvs = finalTimeSec > 0 ? (done3BV / finalTimeSec).toFixed(2) : 0;
    
    document.getElementById('stat-3bv').innerText = `${done3BV} / ${calculated3BV}`;
    document.getElementById('stat-3bvs').innerText = `${bvs}`;
    document.getElementById('stat-time').innerText = `${finalTimeSec.toFixed(3)}s`;
    document.getElementById('stat-lclick').innerText = countLeftClicks;
    document.getElementById('stat-rclick').innerText = countRightClicks;
    document.getElementById('stat-guess').innerText = countGuesses;
    
    const sPanel = document.getElementById('stats-panel');
    if(isWin) {
        sPanel.className = ""; document.getElementById('stats-title').innerText = "🎉 Pro AI 完美通關。實戰數據：";
        document.getElementById('mine-count').innerText = "🏆 勝利";
    } else {
        sPanel.className = "loss"; document.getElementById('stats-title').innerText = "💥 戰死沙場。死前推進數據：";
        document.getElementById('mine-count').innerText = "💀 陣亡";
    }
    sPanel.style.display = 'block';
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c].isMine && !grid[r][c].isFlagged) {
                const cellEl = document.getElementById(`cell-${r}-${c}`);
                cellEl.classList.add('mine'); cellEl.innerText = '💣';
            } else if (!grid[r][c].isMine && grid[r][c].isFlagged) {
                // 標記錯誤的旗子
                const cellEl = document.getElementById(`cell-${r}-${c}`);
                cellEl.innerText = '❌'; cellEl.style.backgroundColor = '#e74c3c';
            }
        }
    }
}

// ==========================================
//     PRO AI 解密器 (一階邏輯 + 二階子集邏輯)
// ==========================================
function aiPlayStep() {
    if (gameOver || gameWon) return false;
    
    if (isFirstClick) {
        countLeftClicks++; revealCell(Math.floor(ROWS/2), Math.floor(COLS/2)); return true;
    }
    
    let boundaryCells = [];
    let hiddenCountGlobal = 0;
    let flagCountGlobal = 0;
    
    // 全局統計與獲取邊界數字
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            let cell = grid[r][c];
            if (!cell.isRevealed && !cell.isFlagged) hiddenCountGlobal++;
            if (cell.isFlagged) flagCountGlobal++;
            
            if (!cell.isRevealed || cell.count === 0) continue;
            
            let neighbors = getNeighbors(r, c);
            let hidden = []; let flags = 0;
            neighbors.forEach(n => {
                if (!n.isRevealed && !n.isFlagged) hidden.push(n);
                if (n.isFlagged) flags++;
            });
            
            if (hidden.length > 0) {
                boundaryCells.push({ r: r, c: c, hidden: hidden, req: cell.count - flags });
            }
        }
    }
    
    let safeMoves = []; let mineMoves = [];
    
    // 【全局邏輯】如果剩下的隱藏格子數量剛好等於剩下的地雷數 -> 全是雷！
    if (hiddenCountGlobal > 0 && hiddenCountGlobal === (MINES - flagCountGlobal)) {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (!grid[r][c].isRevealed && !grid[r][c].isFlagged) {
                    countRightClicks++; flagCell(r, c); return true;
                }
            }
        }
    }

    // 【一階邏輯】基礎滿足條件 (Basic Count)
    for (let bc of boundaryCells) {
        if (bc.req === bc.hidden.length) {
            bc.hidden.forEach(n => { if (!mineMoves.some(m => m.r === n.r && m.c === n.c)) mineMoves.push(n); });
        }
        if (bc.req === 0) {
            bc.hidden.forEach(n => { if (!safeMoves.some(m => m.r === n.r && m.c === n.c)) safeMoves.push(n); });
        }
    }
    
    if (safeMoves.length > 0) { countLeftClicks++; revealCell(safeMoves[0].r, safeMoves[0].c); return true; }
    if (mineMoves.length > 0) { countRightClicks++; flagCell(mineMoves[0].r, mineMoves[0].c); return true; }
    
    // 【二階邏輯】子集推論 (Subset Logic / 1-2-1 終結者)
    for (let i = 0; i < boundaryCells.length; i++) {
        for (let j = 0; j < boundaryCells.length; j++) {
            if (i === j) continue;
            let bcA = boundaryCells[i]; let bcB = boundaryCells[j];
            
            // 如果 A 的隱藏格數量 >= B，那 A 絕不可能是 B 的真子集
            if (bcA.hidden.length >= bcB.hidden.length) continue;
            
            // 檢查 bcA.hidden 是否是 bcB.hidden 的子集
            let isSubset = true;
            for (let nodeA of bcA.hidden) {
                if (!bcB.hidden.some(nodeB => nodeB.r === nodeA.r && nodeB.c === nodeA.c)) {
                    isSubset = false; break;
                }
            }
            
            if (isSubset) {
                let remainingHidden = bcB.hidden.filter(nodeB => !bcA.hidden.some(nodeA => nodeA.r === nodeB.r && nodeA.c === nodeB.c));
                let remainingReq = bcB.req - bcA.req;
                
                // 如果 B 多出來的格子數量，剛好等於 B 多需要尋找的雷數
                if (remainingReq === remainingHidden.length) {
                    remainingHidden.forEach(m => { if (!mineMoves.some(ex => ex.r === m.r && ex.c === m.c)) mineMoves.push(m); });
                } 
                // 如果 B 沒有多餘需要尋找的雷數，那多出來的格子絕對安全
                else if (remainingReq === 0) {
                    remainingHidden.forEach(s => { if (!safeMoves.some(ex => ex.r === s.r && ex.c === s.c)) safeMoves.push(s); });
                }
            }
        }
    }
    
    if (safeMoves.length > 0) { countLeftClicks++; revealCell(safeMoves[0].r, safeMoves[0].c); return true; }
    if (mineMoves.length > 0) { countRightClicks++; flagCell(mineMoves[0].r, mineMoves[0].c); return true; }
    
    // 【絕望盲猜】當所有的邏輯都無法推導，才執行機率盲猜
    countGuesses++;
    return guessBestMove();
}

function guessBestMove() {
    let bestCell = null; let minProbability = 1.1;
    let cellProbabilities = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
    let cellCounts = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            let cell = grid[r][c];
            if (!cell.isRevealed || cell.count === 0) continue;
            
            let neighbors = getNeighbors(r, c);
            let hidden = neighbors.filter(n => !n.isRevealed && !n.isFlagged);
            let flags = neighbors.filter(n => n.isFlagged).length;
            
            if (hidden.length > 0) {
                let prob = (cell.count - flags) / hidden.length;
                hidden.forEach(n => { cellProbabilities[n.r][n.c] += prob; cellCounts[n.r][n.c]++; });
            }
        }
    }
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!grid[r][c].isRevealed && !grid[r][c].isFlagged) {
                let p = 0.20; // 邊界外全局粗估機率
                if (cellCounts[r][c] > 0) p = cellProbabilities[r][c] / cellCounts[r][c];
                if (p < minProbability) { minProbability = p; bestCell = grid[r][c]; }
            }
        }
    }
    
    if (bestCell) { countLeftClicks++; revealCell(bestCell.r, bestCell.c); return true; }
    return false;
}

const speedSlider = document.getElementById('speed-slider');
const speedText = document.getElementById('speed-text');

function getDelayFromSlider(val) {
    if (val > 100) return 0; return Math.floor(2000 / val);
}

speedSlider.addEventListener('input', () => {
    const val = parseInt(speedSlider.value);
    if (val > 100) speedText.innerText = "光速破解 (0ms)";
    else speedText.innerText = `${getDelayFromSlider(val)}ms`;
});

function autoPlayLoop() {
    let moved = aiPlayStep();
    if (!moved || gameOver || gameWon) {
        loopTimeout = null; document.getElementById('btn-loop').innerText = "自動解題 (Auto)"; return;
    }
    const delay = getDelayFromSlider(parseInt(speedSlider.value));
    if (delay === 0) {
        let keepGoing = true;
        while(keepGoing && !gameOver && !gameWon) keepGoing = aiPlayStep();
        loopTimeout = null; document.getElementById('btn-loop').innerText = "自動解題 (Auto)";
    } else {
        loopTimeout = setTimeout(autoPlayLoop, delay);
    }
}

document.getElementById('btn-step').addEventListener('click', () => aiPlayStep());
document.getElementById('btn-loop').addEventListener('click', () => {
    const btn = document.getElementById('btn-loop');
    if (loopTimeout) {
        clearTimeout(loopTimeout); loopTimeout = null; btn.innerText = "自動解題 (Auto)";
    } else {
        btn.innerText = "暫停 (Pause)"; autoPlayLoop();
    }
});

initGame();
</script>
